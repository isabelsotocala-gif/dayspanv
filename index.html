<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dayspan — Date Calculator</title>
<meta name="description" content="Calculate the days between two dates, add or subtract time, and browse any calendar year from 2000 to 2100.">
<meta name="google-site-verification" content="sfbq1yqA3WJec_MLC9QDIsgIpJ1K7Y0L-TF5xY--tjg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-BETL65YT1F"></script>

  gtag('js', new Date());

<style>
  :root{
    --bg: #FAF8F3;
    --surface: #FFFFFF;
    --surface-alt: #F1EEE5;
    --ink: #20261F;
    --muted: #6E7267;
    --hair: rgba(32,38,31,0.10);
    --hair-strong: rgba(32,38,31,0.18);
    --forest: #2B6353;
    --forest-dim: #DCE8E2;
    --amber: #DD8A3C;
    --amber-dim: #FBEADA;
    --shadow: 0 1px 2px rgba(32,38,31,0.04), 0 6px 20px rgba(32,38,31,0.05);
    --shadow-sm: 0 1px 2px rgba(32,38,31,0.05);
    --radius: 10px;
    --radius-sm: 6px;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:
      radial-gradient(1100px 560px at 10% -10%, rgba(43,99,83,0.06), transparent 55%),
      radial-gradient(800px 500px at 100% 0%, rgba(221,138,60,0.05), transparent 55%),
      var(--bg);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  .wrap{
    max-width:920px;
    margin:0 auto;
    padding:48px 24px 100px;
  }

  header.masthead{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding-bottom:22px;
    margin-bottom:36px;
    border-bottom:1px solid var(--hair);
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .brand-mark{
    width:30px;
    height:30px;
    border-radius:8px;
    background:var(--forest);
    display:flex;
    align-items:center;
    justify-content:center;
    flex:0 0 auto;
  }
  .brand-mark span{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    font-weight:600;
    color:#fff;
  }
  .brand-name{
    font-family:'Newsreader', serif;
    font-size:21px;
    font-weight:600;
    letter-spacing:-0.01em;
    color:var(--ink);
  }
  .kicker{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    letter-spacing:0.04em;
    color:var(--muted);
  }

  /* Tabs */
  .mode-toggle{
    display:inline-flex;
    background:var(--surface-alt);
    border-radius:100px;
    padding:4px;
    margin-bottom:36px;
    gap:2px;
  }
  .mode-toggle button{
    font-family:'Work Sans', sans-serif;
    font-weight:500;
    font-size:14px;
    padding:11px 20px;
    border-radius:100px;
    border:none;
    background:transparent;
    color:var(--muted);
    cursor:pointer;
    transition:background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
  }
  .mode-toggle button.active{
    background:var(--surface);
    color:var(--forest);
    box-shadow:var(--shadow-sm);
    font-weight:600;
  }
  .mode-toggle button:hover:not(.active){ color:var(--ink); }
  .mode-toggle button:focus-visible{
    outline:2px solid var(--forest);
    outline-offset:2px;
  }

  .panel{ display:none; }
  .panel.active{ display:block; }

  .card{
    background:var(--surface);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:32px;
  }
  @media (max-width:560px){ .card{ padding:22px; } }

  .field-row{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    gap:18px;
    align-items:end;
  }
  @media (max-width:560px){
    .field-row{grid-template-columns:1fr; gap:14px;}
    .field-row .arrow{display:none;}
  }

  .field{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .field label{
    font-family:'Work Sans', sans-serif;
    font-size:12.5px;
    font-weight:600;
    letter-spacing:0.01em;
    color:var(--muted);
  }
  .field input[type="date"], .field input[type="number"], .field select{
    font-family:'IBM Plex Mono', monospace;
    font-size:16px;
    color:var(--ink);
    background:var(--surface);
    border:1.5px solid var(--hair-strong);
    border-radius:var(--radius-sm);
    padding:13px 14px;
    width:100%;
    color-scheme:light;
    transition:border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .field input:hover, .field select:hover{ border-color:var(--forest); }
  .field input:focus-visible, .field select:focus-visible{
    outline:none;
    border-color:var(--forest);
    box-shadow:0 0 0 3px var(--forest-dim);
  }
  .arrow{
    font-family:'Newsreader', serif;
    font-style:italic;
    font-size:24px;
    color:var(--amber);
    padding-bottom:13px;
  }

  .addsub-row{
    display:grid;
    grid-template-columns:1fr 1fr auto;
    gap:14px;
    align-items:end;
  }
  @media (max-width:560px){
    .addsub-row{grid-template-columns:1fr 1fr; }
    .addsub-row .field:last-child{grid-column:1 / -1;}
  }
  .seg{
    display:flex;
    border:1.5px solid var(--hair-strong);
    border-radius:var(--radius-sm);
    overflow:hidden;
    height:49px;
  }
  .seg button{
    flex:1;
    background:var(--surface);
    border:none;
    color:var(--muted);
    font-family:'Work Sans', sans-serif;
    font-weight:500;
    font-size:13.5px;
    cursor:pointer;
    border-left:1.5px solid var(--hair-strong);
    transition:background 0.15s ease, color 0.15s ease;
  }
  .seg button:first-child{border-left:none;}
  .seg button.active{
    background:var(--forest);
    color:#fff;
    font-weight:600;
  }
  .seg button:hover:not(.active){ background:var(--surface-alt); color:var(--ink); }

  .unit-select-wrap{ max-width:220px; margin-top:18px; }

  /* Result block */
  .result{
    margin-top:32px;
    padding-top:28px;
    border-top:1px solid var(--hair);
  }
  .result-eyebrow{
    font-family:'Work Sans', sans-serif;
    font-size:12.5px;
    font-weight:600;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:10px;
  }
  .result-big{
    font-family:'Newsreader', serif;
    font-weight:600;
    font-size:clamp(38px, 7.5vw, 68px);
    line-height:1.05;
    color:var(--ink);
    letter-spacing:-0.01em;
  }
  .result-big .num{
    color:var(--forest);
    font-variant-numeric:tabular-nums;
  }
  .result-big .unit-label{
    color:var(--ink);
    font-size:0.4em;
    font-family:'Work Sans', sans-serif;
    font-weight:600;
    letter-spacing:0.03em;
    text-transform:uppercase;
    vertical-align:middle;
    margin-left:6px;
  }
  .result-sub{
    font-family:'Work Sans', sans-serif;
    font-size:14px;
    color:var(--muted);
    margin-top:10px;
  }

  .breakdown{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:12px;
    margin-top:28px;
  }
  @media (max-width:560px){
    .breakdown{grid-template-columns:repeat(2, 1fr);}
  }
  .breakdown .cell{
    background:var(--surface-alt);
    border-radius:var(--radius-sm);
    padding:16px 14px;
  }
  .breakdown .cell .n{
    font-family:'IBM Plex Mono', monospace;
    font-size:22px;
    font-weight:600;
    color:var(--forest);
    font-variant-numeric:tabular-nums;
  }
  .breakdown .cell .l{
    font-family:'Work Sans', sans-serif;
    font-size:11.5px;
    font-weight:500;
    letter-spacing:0.02em;
    color:var(--muted);
    margin-top:4px;
  }

  /* Signature: the dayspan ruler */
  .datestrip-wrap{
    margin-top:36px;
  }
  .datestrip-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    color:var(--muted);
    margin-bottom:18px;
    display:flex;
    justify-content:space-between;
  }
  .datestrip-label span:first-child{ color:var(--forest); font-weight:600; }
  .datestrip-label span:last-child{ color:var(--amber); font-weight:600; }
  .datestrip{
    position:relative;
    height:66px;
    background:var(--surface-alt);
    border-radius:var(--radius-sm);
    overflow:hidden;
  }
  .datestrip-track{
    position:absolute;
    top:0; left:0;
    height:100%;
    display:flex;
    align-items:flex-end;
    transition:transform 0.6s cubic-bezier(.16,1,.3,1);
  }
  .tick{
    position:relative;
    flex:0 0 auto;
    width:10px;
    height:14px;
    border-left:1px solid var(--hair-strong);
  }
  .tick.week{ height:24px; border-left-color:rgba(32,38,31,0.28); }
  .tick.month{ height:38px; border-left-color:var(--forest); border-left-width:2px; }
  .tick.month .m-label{
    position:absolute;
    top:-20px;
    left:2px;
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    font-weight:600;
    color:var(--forest);
    white-space:nowrap;
  }
  .datestrip-fade-l, .datestrip-fade-r{
    position:absolute;
    top:0; bottom:0;
    width:36px;
    z-index:2;
    pointer-events:none;
  }
  .datestrip-fade-l{ left:0; background:linear-gradient(90deg, var(--surface-alt), transparent); }
  .datestrip-fade-r{ right:0; background:linear-gradient(270deg, var(--surface-alt), transparent); }

  /* Calendar */
  .cal-controls{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    align-items:end;
    margin-bottom:26px;
  }
  .cal-controls .field select{ min-width:130px; }
  .cal-nav-field{ margin-left:auto; }
  .cal-nav{
    display:flex;
    border:1.5px solid var(--hair-strong);
    border-radius:var(--radius-sm);
    overflow:hidden;
    height:49px;
  }
  .cal-nav button{
    background:var(--surface);
    border:none;
    border-left:1.5px solid var(--hair-strong);
    color:var(--muted);
    font-family:'Work Sans', sans-serif;
    font-weight:500;
    font-size:13px;
    padding:0 16px;
    cursor:pointer;
    transition:background 0.15s ease, color 0.15s ease;
  }
  .cal-nav button:first-child{ border-left:none; }
  .cal-nav button:hover{ background:var(--surface-alt); color:var(--forest); }
  .cal-nav button:focus-visible{ outline:2px solid var(--forest); outline-offset:-2px; }

  .cal-title{
    font-family:'Newsreader', serif;
    font-weight:600;
    font-size:26px;
    color:var(--ink);
    margin-bottom:20px;
  }

  .cal-grid{
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:6px;
  }
  .cal-grid .dow{
    font-family:'Work Sans', sans-serif;
    font-size:11.5px;
    font-weight:600;
    letter-spacing:0.03em;
    text-transform:uppercase;
    color:var(--muted);
    text-align:center;
    padding:6px 0 10px;
  }
  .cal-grid .day{
    background:var(--surface-alt);
    border-radius:var(--radius-sm);
    min-height:70px;
    padding:10px;
    font-family:'IBM Plex Mono', monospace;
    font-size:15px;
    color:var(--ink);
    position:relative;
  }
  .cal-grid .day.outside{ color:var(--muted); opacity:0.45; background:transparent; }
  .cal-grid .day.today{
    background:var(--forest);
    box-shadow:var(--shadow-sm);
  }
  .cal-grid .day.today .num{ color:#fff; font-weight:700; }
  .cal-grid .day.weekend:not(.today) .num{ color:var(--amber); }

  .cal-year-grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:18px;
  }
  @media (max-width:720px){
    .cal-year-grid{ grid-template-columns:repeat(2, 1fr); }
  }
  @media (max-width:420px){
    .cal-year-grid{ grid-template-columns:1fr; }
  }
  .mini-month{
    border-radius:var(--radius-sm);
    padding:14px;
    background:var(--surface-alt);
  }
  .mini-month h4{
    margin:0 0 10px;
    font-family:'Newsreader', serif;
    font-weight:600;
    font-size:15px;
    color:var(--ink);
  }
  .mini-grid{
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:2px;
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
  }
  .mini-grid .mdow{
    text-align:center;
    color:var(--muted);
    padding-bottom:4px;
  }
  .mini-grid .mday{
    text-align:center;
    padding:4px 0;
    color:var(--ink);
    border-radius:3px;
  }
  .mini-grid .mday.outside{ color:var(--muted); opacity:0.3; }
  .mini-grid .mday.today{
    background:var(--forest);
    color:#fff;
    font-weight:600;
  }

  footer{
    margin-top:64px;
    padding-top:22px;
    border-top:1px solid var(--hair);
    font-family:'Work Sans', sans-serif;
    font-size:12.5px;
    color:var(--muted);
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <div class="brand">
      <div class="brand-mark"><span>Ds</span></div>
      <div class="brand-name">Dayspan</div>
    </div>
    <div class="kicker" id="today-label">—</div>
  </header>

  <div class="mode-toggle" role="tablist" aria-label="Calculator mode">
    <button class="active" id="tab-between" role="tab" aria-selected="true">Between two dates</button>
    <button id="tab-addsub" role="tab" aria-selected="false">Add or subtract</button>
    <button id="tab-calendar" role="tab" aria-selected="false">Calendar</button>
  </div>

  <!-- BETWEEN DATES PANEL -->
  <section class="panel active" id="panel-between">
    <div class="card">
      <div class="field-row">
        <div class="field">
          <label for="date-from">From</label>
          <input type="date" id="date-from">
        </div>
        <div class="arrow" aria-hidden="true">→</div>
        <div class="field">
          <label for="date-to">To</label>
          <input type="date" id="date-to">
        </div>
      </div>

      <div class="result">
        <div class="result-eyebrow">Span</div>
        <div class="result-big"><span class="num" id="between-headline">—</span></div>
        <div class="result-sub" id="between-sub">&nbsp;</div>

        <div class="breakdown" id="between-breakdown"></div>

        <div class="datestrip-wrap">
          <div class="datestrip-label">
            <span id="strip-from-label">—</span>
            <span id="strip-to-label">—</span>
          </div>
          <div class="datestrip">
            <div class="datestrip-fade-l"></div>
            <div class="datestrip-fade-r"></div>
            <div class="datestrip-track" id="strip-track"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ADD/SUBTRACT PANEL -->
  <section class="panel" id="panel-addsub">
    <div class="card">
      <div class="addsub-row">
        <div class="field">
          <label for="base-date">Start date</label>
          <input type="date" id="base-date">
        </div>
        <div class="field">
          <label for="amount">Amount</label>
          <input type="number" id="amount" min="0" value="30">
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <div class="seg">
            <button class="active" data-op="add">Add</button>
            <button data-op="subtract">Subtract</button>
          </div>
        </div>
      </div>

      <div class="field unit-select-wrap">
        <label for="unit">Unit</label>
        <select id="unit">
          <option value="days">Days</option>
          <option value="weeks">Weeks</option>
          <option value="months">Months</option>
          <option value="years">Years</option>
        </select>
      </div>

      <div class="result">
        <div class="result-eyebrow">Resulting date</div>
        <div class="result-big"><span class="num" id="addsub-headline">—</span></div>
        <div class="result-sub" id="addsub-sub">&nbsp;</div>
      </div>
    </div>
  </section>

  <!-- CALENDAR PANEL -->
  <section class="panel" id="panel-calendar">
    <div class="card">
      <div class="cal-controls">
        <div class="field">
          <label for="cal-month">Month</label>
          <select id="cal-month"></select>
        </div>
        <div class="field">
          <label for="cal-year">Year</label>
          <select id="cal-year"></select>
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <div class="seg">
            <button class="active" data-view="month">Month</button>
            <button data-view="year">Whole year</button>
          </div>
        </div>
        <div class="field cal-nav-field">
          <label>&nbsp;</label>
          <div class="cal-nav">
            <button id="cal-prev" aria-label="Previous">‹</button>
            <button id="cal-today">Today</button>
            <button id="cal-next" aria-label="Next">›</button>
          </div>
        </div>
      </div>

      <div class="cal-title" id="cal-title">—</div>

      <div id="cal-month-view">
        <div class="cal-grid cal-grid-single" id="cal-single-grid"></div>
      </div>

      <div id="cal-year-view" style="display:none;">
        <div class="cal-year-grid" id="cal-year-grid"></div>
      </div>
    </div>
  </section>

  <footer>
    <span>All calculations run locally in your browser.</span>
    <span id="year-copyright"></span>
  </footer>

</div>

<script>
(function(){
  const todayISO = () => new Date().toISOString().split('T')[0];
  const fmtLong = d => d.toLocaleDateString(undefined, { year:'numeric', month:'long', day:'numeric' });
  const fmtShort = d => d.toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' });
  const parseLocal = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };
  const MS_DAY = 86400000;

  const today = new Date();
  document.getElementById('today-label').textContent = 'Today — ' + fmtShort(today);
  document.getElementById('year-copyright').textContent = 'Dayspan, ' + today.getFullYear();

  // ---- Tabs ----
  const tabBetween = document.getElementById('tab-between');
  const tabAddsub = document.getElementById('tab-addsub');
  const tabCalendar = document.getElementById('tab-calendar');
  const panelBetween = document.getElementById('panel-between');
  const panelAddsub = document.getElementById('panel-addsub');
  const panelCalendar = document.getElementById('panel-calendar');

  const tabs = { between: tabBetween, addsub: tabAddsub, calendar: tabCalendar };
  const panels = { between: panelBetween, addsub: panelAddsub, calendar: panelCalendar };

  function showPanel(which){
    Object.keys(tabs).forEach(key => {
      const isActive = key === which;
      tabs[key].classList.toggle('active', isActive);
      tabs[key].setAttribute('aria-selected', isActive);
      panels[key].classList.toggle('active', isActive);
    });
    if (which === 'calendar' && !window.__calInitDone){
      initCalendar();
      window.__calInitDone = true;
    }
  }
  tabBetween.addEventListener('click', () => showPanel('between'));
  tabAddsub.addEventListener('click', () => showPanel('addsub'));
  tabCalendar.addEventListener('click', () => showPanel('calendar'));

  // ---- Between dates ----
  const dateFrom = document.getElementById('date-from');
  const dateTo = document.getElementById('date-to');

  const d1 = new Date(); d1.setMonth(d1.getMonth() - 2);
  dateFrom.value = d1.toISOString().split('T')[0];
  dateTo.value = todayISO();

  function yearsMonthsDays(a, b){
    let years = b.getFullYear() - a.getFullYear();
    let months = b.getMonth() - a.getMonth();
    let days = b.getDate() - a.getDate();
    if (days < 0){
      months -= 1;
      const prevMonth = new Date(b.getFullYear(), b.getMonth(), 0).getDate();
      days += prevMonth;
    }
    if (months < 0){ years -= 1; months += 12; }
    return { years, months, days };
  }

  function updateBetween(){
    let a = parseLocal(dateFrom.value);
    let b = parseLocal(dateTo.value);
    const headline = document.getElementById('between-headline');
    const sub = document.getElementById('between-sub');
    const breakdown = document.getElementById('between-breakdown');
    const stripFromLabel = document.getElementById('strip-from-label');
    const stripToLabel = document.getElementById('strip-to-label');

    if (!dateFrom.value || !dateTo.value){
      headline.textContent = '—';
      sub.textContent = 'Pick both dates.';
      breakdown.innerHTML = '';
      return;
    }

    const swapped = a > b;
    if (swapped){ [a,b] = [b,a]; }

    const totalDays = Math.round((b - a) / MS_DAY);
    const totalWeeks = (totalDays / 7).toFixed(1);
    const ymd = yearsMonthsDays(a, b);

    headline.innerHTML = totalDays.toLocaleString() + ' <span class="unit-label">days</span>';
    sub.textContent = (swapped ? 'Dates were reversed automatically. ' : '') + fmtLong(a) + '  →  ' + fmtLong(b);

    breakdown.innerHTML = `
      <div class="cell"><div class="n">${ymd.years}</div><div class="l">Years</div></div>
      <div class="cell"><div class="n">${ymd.months}</div><div class="l">Months</div></div>
      <div class="cell"><div class="n">${totalWeeks}</div><div class="l">Weeks</div></div>
      <div class="cell"><div class="n">${ymd.days}</div><div class="l">Days (rem.)</div></div>
    `;

    stripFromLabel.textContent = fmtShort(a);
    stripToLabel.textContent = fmtShort(b);
    renderStrip(a, b);
  }

  function renderStrip(a, b){
    const track = document.getElementById('strip-track');
    track.innerHTML = '';
    const totalDays = Math.max(1, Math.round((b - a) / MS_DAY));

    const maxTicks = 400;
    let step = 1;
    if (totalDays > maxTicks) step = Math.ceil(totalDays / maxTicks);

    const frag = document.createDocumentFragment();
    for (let i = 0; i <= totalDays; i += step){
      const d = new Date(a.getTime() + i * MS_DAY);
      const isMonthStart = d.getDate() === 1 || i === 0;
      const isWeekMark = d.getDay() === 1;
      const tick = document.createElement('div');
      tick.className = 'tick' + (isMonthStart ? ' month' : (isWeekMark ? ' week' : ''));
      if (isMonthStart){
        const lbl = document.createElement('span');
        lbl.className = 'm-label';
        lbl.textContent = d.toLocaleDateString(undefined, { month:'short', year: d.getMonth()===0 ? 'numeric' : undefined });
        tick.appendChild(lbl);
      }
      frag.appendChild(tick);
    }
    track.appendChild(frag);

    requestAnimationFrame(() => {
      const wrapWidth = track.parentElement.clientWidth;
      const trackWidth = track.scrollWidth;
      const offset = Math.min(0, (wrapWidth - trackWidth) / 2);
      track.style.transform = `translateX(${offset}px)`;
    });
  }

  dateFrom.addEventListener('input', updateBetween);
  dateTo.addEventListener('input', updateBetween);
  window.addEventListener('resize', () => updateBetween());
  updateBetween();

  // ---- Add / Subtract ----
  const baseDate = document.getElementById('base-date');
  const amount = document.getElementById('amount');
  const unit = document.getElementById('unit');
  const segButtons = document.querySelectorAll('#panel-addsub .seg button');
  let op = 'add';

  baseDate.value = todayISO();

  segButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      segButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      op = btn.dataset.op;
      updateAddSub();
    });
  });

  function updateAddSub(){
    const headline = document.getElementById('addsub-headline');
    const sub = document.getElementById('addsub-sub');
    if (!baseDate.value || amount.value === ''){
      headline.textContent = '—';
      sub.textContent = 'Enter a date and an amount.';
      return;
    }
    const start = parseLocal(baseDate.value);
    const n = parseInt(amount.value, 10) || 0;
    const signedN = op === 'add' ? n : -n;
    let result = new Date(start);

    const u = unit.value;
    if (u === 'days') result.setDate(result.getDate() + signedN);
    else if (u === 'weeks') result.setDate(result.getDate() + signedN * 7);
    else if (u === 'months') result.setMonth(result.getMonth() + signedN);
    else if (u === 'years') result.setFullYear(result.getFullYear() + signedN);

    headline.textContent = fmtLong(result);
    const weekday = result.toLocaleDateString(undefined, { weekday: 'long' });
    sub.textContent = weekday + ' — ' + (op === 'add' ? n + ' ' + u + ' after ' : n + ' ' + u + ' before ') + fmtShort(start);
  }

  [baseDate, amount, unit].forEach(el => el.addEventListener('input', updateAddSub));
  updateAddSub();

  // ---- Calendar ----
  const MIN_YEAR = 2000, MAX_YEAR = 2100;
  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOW_SHORT = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  const calMonthSel = document.getElementById('cal-month');
  const calYearSel = document.getElementById('cal-year');
  const calPrev = document.getElementById('cal-prev');
  const calNext = document.getElementById('cal-next');
  const calToday = document.getElementById('cal-today');
  const calViewButtons = document.querySelectorAll('#panel-calendar .seg button');
  const calMonthView = document.getElementById('cal-month-view');
  const calYearView = document.getElementById('cal-year-view');
  const calTitle = document.getElementById('cal-title');
  const calSingleGrid = document.getElementById('cal-single-grid');
  const calYearGrid = document.getElementById('cal-year-grid');

  let calState = { year: 2026, month: 7, view: 'month' }; // default: August 2026
  const realToday = new Date();

  function initCalendar(){
    MONTH_NAMES.forEach((m, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = m;
      calMonthSel.appendChild(opt);
    });
    for (let y = MIN_YEAR; y <= MAX_YEAR; y++){
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y;
      calYearSel.appendChild(opt);
    }
    calMonthSel.value = calState.month;
    calYearSel.value = calState.year;

    calMonthSel.addEventListener('change', () => { calState.month = parseInt(calMonthSel.value, 10); renderCalendar(); });
    calYearSel.addEventListener('change', () => { calState.year = parseInt(calYearSel.value, 10); renderCalendar(); });

    calPrev.addEventListener('click', () => {
      if (calState.view === 'month'){
        calState.month--;
        if (calState.month < 0){ calState.month = 11; calState.year--; }
      } else {
        calState.year--;
      }
      clampYear();
      syncControls();
      renderCalendar();
    });
    calNext.addEventListener('click', () => {
      if (calState.view === 'month'){
        calState.month++;
        if (calState.month > 11){ calState.month = 0; calState.year++; }
      } else {
        calState.year++;
      }
      clampYear();
      syncControls();
      renderCalendar();
    });
    calToday.addEventListener('click', () => {
      calState.year = realToday.getFullYear();
      calState.month = realToday.getMonth();
      syncControls();
      renderCalendar();
    });

    calViewButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        calViewButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        calState.view = btn.dataset.view;
        calMonthView.style.display = calState.view === 'month' ? 'block' : 'none';
        calYearView.style.display = calState.view === 'year' ? 'block' : 'none';
        renderCalendar();
      });
    });

    renderCalendar();
  }

  function clampYear(){
    if (calState.year < MIN_YEAR){ calState.year = MIN_YEAR; calState.month = 0; }
    if (calState.year > MAX_YEAR){ calState.year = MAX_YEAR; calState.month = 11; }
  }

  function syncControls(){
    calMonthSel.value = calState.month;
    calYearSel.value = calState.year;
  }

  function isSameDay(a, b){
    return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
  }

  function buildMonthCells(year, month){
    const firstOfMonth = new Date(year, month, 1);
    const startOffset = firstOfMonth.getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const daysInPrevMonth = new Date(year, month, 0).getDate();

    const cells = [];
    for (let i = 0; i < startOffset; i++){
      const d = daysInPrevMonth - startOffset + i + 1;
      cells.push({ day: d, outside: true, date: new Date(year, month - 1, d) });
    }
    for (let d = 1; d <= daysInMonth; d++){
      cells.push({ day: d, outside: false, date: new Date(year, month, d) });
    }
    while (cells.length % 7 !== 0 || cells.length < 42){
      const nextIndex = cells.length - (startOffset + daysInMonth) + 1;
      cells.push({ day: nextIndex, outside: true, date: new Date(year, month + 1, nextIndex) });
      if (cells.length >= 42) break;
    }
    return cells;
  }

  function renderCalendar(){
    if (calState.view === 'month'){
      calTitle.textContent = MONTH_NAMES[calState.month] + ' ' + calState.year;
      calSingleGrid.innerHTML = '';
      DOW_SHORT.forEach(d => {
        const el = document.createElement('div');
        el.className = 'dow';
        el.textContent = d;
        calSingleGrid.appendChild(el);
      });
      const cells = buildMonthCells(calState.year, calState.month);
      cells.forEach(c => {
        const el = document.createElement('div');
        const dow = c.date.getDay();
        el.className = 'day' + (c.outside ? ' outside' : '') + (dow === 0 || dow === 6 ? ' weekend' : '') + (isSameDay(c.date, realToday) ? ' today' : '');
        el.innerHTML = '<span class="num">' + c.day + '</span>';
        calSingleGrid.appendChild(el);
      });
    } else {
      calTitle.textContent = calState.year + ' — full year';
      calYearGrid.innerHTML = '';
      for (let m = 0; m < 12; m++){
        const box = document.createElement('div');
        box.className = 'mini-month';
        const h4 = document.createElement('h4');
        h4.textContent = MONTH_NAMES[m];
        box.appendChild(h4);

        const grid = document.createElement('div');
        grid.className = 'mini-grid';
        DOW_SHORT.forEach(d => {
          const el = document.createElement('div');
          el.className = 'mdow';
          el.textContent = d[0];
          grid.appendChild(el);
        });
        const cells = buildMonthCells(calState.year, m);
        cells.forEach(c => {
          const el = document.createElement('div');
          el.className = 'mday' + (c.outside ? ' outside' : '') + (isSameDay(c.date, realToday) ? ' today' : '');
          el.textContent = c.day;
          grid.appendChild(el);
        });
        box.appendChild(grid);
        calYearGrid.appendChild(box);
      }
    }
  }

})();
</script>
</body>
</html>
